<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>QuickTeam Outbound — Command Center</title>
<style>
  :root{
    --bg:#f4f7fc; --panel:#ffffff; --panel2:#f7f9fd; --tint:#eef4ff;
    --line:#e4e9f2; --line2:#d3dbe8;
    --ink:#0f1e34; --mid:#56657f; --faint:#8b98af;
    --blue:#2563eb; --blue-dk:#1d4ed8; --blue-lt:#e7efff;
    --green:#0c9d63; --green-lt:#e4f6ee; --amber:#c9820a; --amber-lt:#fbf1dc; --red:#dc3545; --red-lt:#fdeaec; --violet:#7c3aed;
    --shadow:0 1px 2px rgba(16,30,52,.05),0 4px 16px rgba(16,30,52,.05);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;padding-bottom:74px;}
  a{color:var(--blue);text-decoration:none;}
  .wrap{max-width:1120px;margin:0 auto;padding:8px 14px 28px;}
  .top{position:sticky;top:0;z-index:20;background:rgba(244,247,252,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:12px 14px;}
  .top-in{max-width:1120px;margin:0 auto;display:flex;align-items:center;gap:11px;}
  .logo{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--blue),var(--violet));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#fff;}
  .brand h1{font-size:16px;font-weight:800;letter-spacing:-.01em;}
  .brand .sub{font-size:11px;color:var(--faint);}
  .dry{margin-left:auto;font-size:10px;font-weight:800;letter-spacing:.05em;color:var(--amber);background:var(--amber-lt);border:1px solid #f0dcae;padding:5px 10px;border-radius:20px;}
  .dnav{display:none;gap:4px;margin-top:11px;}
  .dnav button{font:inherit;font-size:13px;font-weight:600;color:var(--mid);background:transparent;border:none;border-radius:8px;padding:8px 13px;cursor:pointer;}
  .dnav button.on{color:var(--blue-dk);background:var(--blue-lt);}
  h2{font-size:20px;font-weight:800;letter-spacing:-.01em;margin:14px 0 3px;}
  .lead{color:var(--mid);font-size:13px;margin-bottom:16px;max-width:680px;}
  .chips{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;margin-bottom:16px;}
  @media(min-width:640px){.chips{grid-template-columns:repeat(4,1fr);}}
  .chip{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:14px;box-shadow:var(--shadow);}
  .chip .n{font-size:24px;font-weight:800;line-height:1;}
  .chip .l{font-size:11px;color:var(--faint);margin-top:6px;}
  .chip.g .n{color:var(--green);} .chip.a .n{color:var(--amber);} .chip.b .n{color:var(--blue);} .chip.r .n{color:var(--red);}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow);}
  .panel h3{font-size:14px;font-weight:800;margin-bottom:12px;}
  .sec-h{display:flex;align-items:center;gap:8px;margin:16px 0 10px;font-weight:800;font-size:14px;}
  .dot{width:9px;height:9px;border-radius:50%;}
  .grid{display:grid;grid-template-columns:1fr;gap:11px;}
  @media(min-width:720px){.grid{grid-template-columns:1fr 1fr;}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:14px;cursor:pointer;box-shadow:var(--shadow);transition:border-color .12s,transform .12s;}
  .card:hover{border-color:var(--blue);transform:translateY(-1px);}
  .card .r1{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;}
  .card .co{font-size:12px;color:var(--faint);}
  .card .ti{font-weight:700;font-size:14.5px;margin:2px 0 8px;line-height:1.3;color:var(--ink);}
  .score{font-weight:800;font-size:19px;min-width:32px;text-align:right;}
  .bar{height:6px;border-radius:6px;background:#eef1f6;overflow:hidden;margin:9px 0;}
  .bar i{display:block;height:100%;border-radius:6px;}
  .tags{display:flex;flex-wrap:wrap;gap:5px;}
  .tag{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:20px;background:var(--panel2);color:var(--mid);border:1px solid var(--line);}
  .tag.cl{color:var(--blue-dk);background:var(--blue-lt);border-color:#cfe0ff;}
  .tag.pri{color:var(--amber);background:var(--amber-lt);border-color:#f0dcae;}
  .btn{font:inherit;font-weight:700;border-radius:10px;padding:10px 14px;cursor:pointer;border:1px solid var(--line2);background:var(--panel);color:var(--ink);}
  .btn.primary{background:var(--blue);border-color:var(--blue);color:#fff;}
  .btn.sm{padding:8px 12px;font-size:12.5px;}
  .btn:disabled{opacity:.5;cursor:default;}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  /* funnel */
  .funnel{display:flex;flex-direction:column;gap:8px;}
  .fr{display:grid;grid-template-columns:96px 1fr 46px;align-items:center;gap:10px;font-size:12.5px;}
  .fr .flabel{color:var(--mid);} .fr .fnum{text-align:right;font-weight:800;}
  .ftrack{height:22px;background:#eef1f6;border-radius:7px;overflow:hidden;}
  .ftrack i{display:block;height:100%;border-radius:7px;background:linear-gradient(90deg,var(--blue),var(--violet));}
  /* activity */
  .feed{display:flex;flex-direction:column;gap:0;}
  .fi{display:flex;gap:9px;padding:9px 0;border-bottom:1px solid var(--line);font-size:12.5px;}
  .fi:last-child{border:none;} .fi .ic{width:22px;text-align:center;}
  .fi .t{color:var(--ink);} .fi .m{color:var(--faint);font-size:11px;}
  /* table */
  .tbl-tools{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
  .search{flex:1;min-width:150px;}
  input,textarea,select{width:100%;background:var(--panel);border:1px solid var(--line2);border-radius:9px;color:var(--ink);font:inherit;padding:9px 11px;}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--blue);}
  .tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--line);border-radius:12px;background:var(--panel);box-shadow:var(--shadow);}
  table{width:100%;border-collapse:collapse;font-size:12.5px;min-width:520px;}
  th{text-align:left;color:var(--faint);font-weight:700;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;padding:10px 10px;border-bottom:1px solid var(--line2);background:var(--panel2);position:sticky;top:0;cursor:pointer;white-space:nowrap;}
  td{padding:10px;border-bottom:1px solid var(--line);color:var(--mid);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tbody tr{cursor:pointer;} tbody tr:hover{background:var(--tint);}
  .sc-badge{font-weight:800;padding:2px 8px;border-radius:7px;font-size:12px;}
  .pill{font-size:10px;font-weight:800;padding:3px 8px;border-radius:20px;white-space:nowrap;}
  .pill.g{background:var(--green-lt);color:var(--green);} .pill.a{background:var(--amber-lt);color:var(--amber);} .pill.r{background:var(--red-lt);color:var(--red);}
  .pill.on{background:var(--green-lt);color:var(--green);} .pill.cand{background:var(--amber-lt);color:var(--amber);}
  .pill.live{background:var(--green-lt);color:var(--green);} .pill.stub{background:#eef1f6;color:var(--faint);}
  .kv{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px;}
  .kv:last-child{border:none;} .kv .k{color:var(--faint);}
  .reasons{font-size:12.5px;line-height:1.8;}
  .reasons .pos{color:var(--green);} .reasons .neg{color:var(--red);} .reasons .cap{color:var(--amber);}
  .verdict-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0;}
  .vb{font:inherit;font-weight:700;font-size:13px;padding:12px;border-radius:11px;border:1px solid var(--line2);background:var(--panel);color:var(--ink);cursor:pointer;}
  .vb.sel.good{background:var(--green-lt);border-color:var(--green);color:var(--green);}
  .vb.sel.bad{background:var(--red-lt);border-color:var(--red);color:var(--red);}
  .rtags{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0;}
  .rt{font-size:11.5px;font-weight:600;padding:6px 10px;border-radius:20px;border:1px solid var(--line);background:var(--panel);color:var(--mid);cursor:pointer;}
  .rt.on{background:var(--blue-lt);border-color:var(--blue);color:var(--blue-dk);}
  .flow{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:11px;color:var(--mid);}
  .flow .n{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:6px 9px;white-space:nowrap;}
  .flow .ar{color:var(--faint);}
  .bench{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .bench .b{border-radius:13px;padding:16px;border:1px solid var(--line);box-shadow:var(--shadow);}
  .bench .old{background:var(--red-lt);border-color:#f3c6cb;} .bench .new{background:var(--green-lt);border-color:#bfe6d3;}
  .bench .big{font-size:30px;font-weight:800;line-height:1;}
  .trend{display:flex;align-items:flex-end;gap:16px;height:130px;padding:10px 0;}
  .trend .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;justify-content:flex-end;}
  .trend .barv{width:100%;max-width:64px;border-radius:8px 8px 0 0;}
  .muted{color:var(--faint);font-size:12px;}
  .quote{font-size:12px;color:var(--mid);font-style:italic;border-left:2px solid var(--line2);padding-left:9px;margin-top:6px;}
  .hero{background:linear-gradient(135deg,#e8f0ff,#eef4ff 55%,#f4f7fc);border:1px solid #d9e5ff;border-radius:16px;padding:20px 20px 18px;margin:6px 0 16px;box-shadow:var(--shadow);}
  .hero .eyebrow{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:800;letter-spacing:.05em;color:var(--blue-dk);background:#fff;border:1px solid #cfe0ff;padding:5px 11px;border-radius:20px;text-transform:uppercase;}
  .hero .big{font-size:clamp(26px,5vw,34px);font-weight:800;letter-spacing:-.02em;margin:12px 0 4px;}
  .hero .tl2{color:var(--mid);font-size:14px;margin-bottom:14px;}
  .hero .metastrip{display:grid;grid-template-columns:1fr;gap:8px;margin-top:14px;}
  @media(min-width:700px){.hero .metastrip{grid-template-columns:repeat(3,1fr);}}
  .hero .ms{background:rgba(255,255,255,.7);border:1px solid #e0e9f8;border-radius:11px;padding:10px 12px;font-size:12.5px;color:var(--mid);display:flex;align-items:center;gap:8px;}
  .idle{margin-left:auto;font-size:11px;font-weight:700;color:var(--faint);background:#fff;border:1px solid var(--line);padding:5px 11px;border-radius:20px;}
  .glance{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
  @media(min-width:560px){.glance{grid-template-columns:repeat(3,1fr);}}
  @media(min-width:900px){.glance{grid-template-columns:repeat(6,1fr);}}
  .gc{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:13px 14px;box-shadow:var(--shadow);}
  .gc .gt{display:flex;justify-content:space-between;align-items:center;}
  .gc .lab{font-size:10px;font-weight:800;letter-spacing:.04em;color:var(--faint);text-transform:uppercase;}
  .gc .ic{width:26px;height:26px;border-radius:8px;background:var(--tint);display:flex;align-items:center;justify-content:center;font-size:14px;}
  .gc .n{font-size:24px;font-weight:800;margin:6px 0 2px;}
  .gc .d{font-size:11px;color:var(--faint);}
  .seg{display:inline-flex;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .seg button{border:none;background:none;padding:7px 13px;font:inherit;font-weight:700;font-size:12px;color:var(--mid);cursor:pointer;}
  .seg button.on{background:var(--blue);color:#fff;}
  .status{font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;}
  .status.won{background:var(--green-lt);color:var(--green);} .status.cold{background:var(--blue-lt);color:var(--blue-dk);} .status.lost{background:var(--red-lt);color:var(--red);} .status.active{background:var(--amber-lt);color:var(--amber);}
  .status .d2{width:7px;height:7px;border-radius:50%;background:currentColor;}
  .lead-row{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;box-shadow:var(--shadow);}
  .lead-row:hover{border-color:var(--blue);}
  .lead-row .co{font-weight:700;color:var(--ink);} .lead-row .u{font-size:11.5px;color:var(--faint);}
  .tabs2{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
  .tabs2 button{font:inherit;font-weight:700;font-size:12.5px;color:var(--mid);background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:8px 13px;cursor:pointer;}
  .tabs2 button.on{background:var(--blue-lt);color:var(--blue-dk);border-color:var(--blue);}
  .timeline-card{display:flex;gap:12px;padding:13px 0;border-bottom:1px solid var(--line);}
  .timeline-card:last-child{border:none;} .timeline-card .ti{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
  .timeline-card .when{font-size:11px;font-weight:800;color:var(--blue-dk);}
  .tabbar{position:fixed;bottom:0;left:0;right:0;z-index:30;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex;overflow-x:auto;padding:6px 2px 9px;}
  .tabbar button{flex:1;min-width:64px;background:none;border:none;color:var(--faint);font:inherit;font-size:10px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;cursor:pointer;}
  .tabbar button.on{color:var(--blue);}
  .tabbar .ic{font-size:17px;line-height:1;}
  @media(min-width:900px){.tabbar{display:none;} body{padding-bottom:24px;} .dnav{display:flex;}}
  .modal{position:fixed;inset:0;z-index:50;background:rgba(15,30,52,.35);display:flex;align-items:flex-end;justify-content:center;}
  @media(min-width:720px){.modal{align-items:center;}}
  .sheet{background:var(--bg);border:1px solid var(--line2);border-radius:18px 18px 0 0;width:100%;max-width:640px;max-height:90vh;overflow:auto;padding:18px;}
  @media(min-width:720px){.sheet{border-radius:16px;}}
  .x{float:right;font-size:24px;color:var(--faint);background:none;border:none;cursor:pointer;line-height:1;}
</style>
</head>
<body>
<div id="root"></div>
<script src="vendor/react.js"></script>
<script src="vendor/react-dom.js"></script>
<script src="vendor/htm.js"></script>
<script src="data.js"></script>
<script>
const {useState,useMemo,useEffect} = React;
const html = htm.bind(React.createElement);
const D = window.QT_DATA;

const scoreColor = s => s>=70?"var(--green)":s>=40?"var(--amber)":"var(--red)";
const scoreBg = s => s>=70?"var(--green-lt)":s>=40?"var(--amber-lt)":"var(--red-lt)";
const vLabel = v => v==="deprioritized"?"nurture":v;
const vPill = v => v==="qualified"?"g":v==="deprioritized"?"a":"r";
const CL = [["front_desk","receptionist|front desk|front office|patient service|patient access|scheduler|scheduling|patient coordinator|intake"],
  ["billing_rcm","biller|billing|claims|revenue cycle|rcm|accounts receivable|collections|insurance verification|eligibility|prior auth|reimbursement|denial"],
  ["records","medical records|health information|data entry|roi|records clerk|administrative assistant|office assistant|bookkeeping"]];
const cluster = t => { const s=(t||"").toLowerCase(); for(const [n,p] of CL){ if(new RegExp(p).test(s)) return n; } return "general_va"; };
const LS="qt_feedback_v2";
const loadFb=()=>{try{return JSON.parse(localStorage.getItem(LS))||{}}catch(e){return {}}};
const saveFb=o=>localStorage.setItem(LS,JSON.stringify(o));
const PRI=new Set(D.stats.priority_companies);

function Chip({n,l,cls}){return html`<div className=${"chip "+(cls||"")}><div className="n">${n}</div><div className="l">${l}</div></div>`;}
function Reasons({text}){
  if(!text) return null;
  return html`<div className="reasons">${text.split(";").map(s=>s.trim()).filter(Boolean).map((p,i)=>{
    const c=p[0]==="+"?"pos":p[0]==="-"?"neg":(p.startsWith("cap")||p.startsWith("hard"))?"cap":"";
    return html`<div key=${i} className=${c}>${p}</div>`;})}</div>`;}
function Card({l,onClick}){
  return html`<div className="card" onClick=${onClick}>
    <div className="r1"><div><div className="co">${l.company} · ${l.location||"US"}</div><div className="ti">${l.title}</div></div>
      <div className="score" style=${{color:scoreColor(l.score)}}>${l.score}</div></div>
    <div className="bar"><i style=${{width:l.score+"%",background:scoreColor(l.score)}}></i></div>
    <div className="tags"><span className="tag cl">${cluster(l.title)}</span><span className="tag">${l.size}</span>
      ${PRI.has(l.company)&&html`<span className="tag pri">★ priority</span>`}
      ${l.remote==="explicit-remote"&&html`<span className="tag">remote</span>`}</div></div>`;}

const TIMELINES=[
  ["⚡","Speed sweep","Every 3 hours","var(--red-lt)","Priority signals only — companies posting 3+ roles or multi-location. Small, fast pass so hot accounts get a same-day touch (speed-to-lead).","~15–30 postings"],
  ["📅","Daily core","06:00 ET daily","var(--blue-lt)","The main engine — all 25 target titles across Indeed + LinkedIn, US employers, postings ≤14 days old. Scores, size-gates, and queues everything that clears ≥70.","~250–300 postings"],
  ["🗓️","Weekly deep","Sundays 07:00 ET","var(--green-lt)","Niche healthcare boards + free-board backfill, plus a full re-score of the nurture pool against the latest rubric version so learning improvements re-grade older leads.","nurture pool + backfill"]];

function Pipeline({leads,setSel,go}){
  const s=D.stats;
  const [win,setWin]=useState("24h");
  const glance=[["Scraped",s.total,"jobs ingested","📥"],["Qualified",s.qualified,"passed ≥70 gate","✨"],
    ["Nurture",s.nurture,"40–69 softer track","◐"],["Enriched",8,"NPPES + Clay","👥"],["Sequenced",5,"outreach queued","✉"],["Replied",0,"awaiting keys","✓"]];
  const acts=[["📥","259 postings scraped","Indeed · 14-day window · $0"],["🧠","Scored against QuickTeam rubric v1.0","10 qualified · 128 nurture"],
    ["🚪","NPPES size gate ran","hospitals/large orgs excluded, free"],["✅","Eval promoted v1.0 over baseline","77% vs 67% on the 61 holdout"],
    ["✍️","5 sequences drafted (DRY-RUN)","Sonnet · cluster-routed"]];
  const qualified=leads.filter(l=>l.verdict==="qualified");
  const priorityLeads=leads.filter(l=>PRI.has(l.company)&&l.verdict!=="disqualified").slice(0,6);
  return html`<div>
    <div className="hero">
      <div className="row"><span className="eyebrow"><span className="d2" style=${{width:7,height:7,borderRadius:"50%",background:"var(--green)",display:"inline-block"}}></span> Agentic pipeline · Dry run</span><span className="idle">● Pipeline idle</span></div>
      <div className="big">QuickTeam Outbound</div>
      <div className="tl2">Signal-scored healthcare-admin postings, re-oriented for QuickTeam's buyer ICP.</div>
      <div className="row"><button className="btn primary" onClick=${()=>go("jobs")}>⚡ Run scrape now →</button><button className="btn" onClick=${()=>go("jobs")}>Browse jobs</button></div>
      <div className="metastrip">
        <div className="ms">🌐 Indeed + LinkedIn · US employers</div>
        <div className="ms">✨ Claude-scored VA fit (≥70 gate)</div>
        <div className="ms">⏱ 3 scraping timelines · see below</div></div></div>

    <div className="row" style=${{justifyContent:"space-between",margin:"4px 0 10px"}}>
      <div><div className="muted" style=${{fontWeight:800,letterSpacing:".04em"}}>LAST ${win.toUpperCase()}</div><h2 style=${{margin:"2px 0 0"}}>Pipeline at a glance</h2></div>
      <div className="row"><button className="btn sm">↻ Refresh</button><div className="seg">${["24h","7d","30d"].map(w=>html`<button key=${w} className=${win===w?"on":""} onClick=${()=>setWin(w)}>${w}</button>`)}</div></div></div>
    <div className="glance">${glance.map(g=>html`<div className="gc" key=${g[0]}><div className="gt"><span className="lab">${g[0]}</span><span className="ic">${g[3]}</span></div><div className="n" style=${{color:g[0]==="Qualified"?"var(--green)":g[0]==="Nurture"?"var(--amber)":"var(--ink)"}}>${g[1]}</div><div className="d">${g[2]}</div></div>`)}</div>

    <div className="panel" style=${{marginTop:14}}><h3>Scraping timelines <span className="muted">· 3 cadences</span></h3>
      ${TIMELINES.map((t,i)=>html`<div className="timeline-card" key=${i}><div className="ti" style=${{background:t[3]}}>${t[0]}</div>
        <div style=${{flex:1}}><div className="row" style=${{justifyContent:"space-between"}}><span style=${{fontWeight:700,color:"var(--ink)"}}>${t[1]}</span><span className="when">${t[2]}</span></div>
        <div className="muted" style=${{margin:"3px 0 4px",color:"var(--mid)"}}>${t[4]}</div><div className="muted">Volume: ${t[5]}</div></div></div>`)}
      <div className="muted" style=${{marginTop:8}}>Each timeline runs the same scorer + NPPES gate; only the trigger, sources, and volume differ.</div></div>

      <div className="rtags">${FB_TAGS.map(t=>html`<span key=${t} className=${"rt "+(tags.includes(t)?"on":"")} onClick=${()=>setTags(tags.includes(t)?tags.filter(x=>x!==t):[...tags,t])}>${t}</span>`)}</div>
      <textarea rows="2" placeholder="Note (e.g. 'US-based, needs convincing to hire abroad')" value=${note} onInput=${e=>setNote(e.target.value)}></textarea>
      <button className="btn primary sm" style=${{width:"100%",marginTop:8}} disabled=${!v} onClick=${save}>${saved?"✓ Saved — feeds the next learning run":"Save feedback"}</button></div>
    <div className="panel"><h3>NPPES size gate</h3><div className="kv"><span className="k">Provider count (stub)</span><span>4 · solo-small</span></div><div className="kv"><span className="k">Excluded?</span><span style=${{color:"var(--green)"}}>No — in ICP</span></div></div>
    <div className="panel"><h3>Contacts</h3>${contacts.map((c,i)=>html`<div key=${i} style=${{padding:"8px 0",borderBottom:i<contacts.length-1?"1px solid var(--line)":"none"}}>
      <div className="row" style=${{justifyContent:"space-between"}}><span style=${{fontWeight:600,color:"var(--ink)"}}>${c.name}</span><span className=${"pill "+(c.verified?"g":"a")}>${c.verified?"verified":"unverified"} · ${c.conf}</span></div>
      <div className="muted">${c.title}</div><div className="muted">✉ ${c.email} · ☎ ${c.phone}</div><div className="muted">in ${c.linkedin}</div></div>`)}
      <div className="muted" style=${{marginTop:6}}>Enriched via Clay waterfall (stub) · LinkedIn pulled per contact</div></div>
    <div className="panel"><h3>Activity</h3><div className="feed">${acts.map((a,i)=>html`<div className="fi" key=${i}><span className="ic">${a[0]}</span><div><div className="t">${a[1]}</div><div className="m">${a[2]}</div></div></div>`)}</div></div>
    <div className="panel"><h3>Sequence (${cl} cluster)</h3><div className="muted">5-touch, cluster-routed. Touch 1 opener:</div>
      <div className="quote">"Saw ${l.company} is hiring a ${l.title.toLowerCase()} — the ramp on that seat is usually the hidden cost. We place trained, HIPAA-ready VAs for it at ~40–60% less. If it's an hourly role, worth a quick cost comparison?"</div></div>
    <div className="row"><button className="btn primary" style=${{flex:1}}>Approve → SalesBlink (DRY-RUN)</button><button className="btn">Push to Close</button></div></div></div>`;}

const STATUS={new:["Cold Leads","cold"],contacted:["Active","active"],replied:["Active","active"],meeting:["Active","active"],won:["Closed Won","won"],lost:["Lost","lost"]};
function CRM({setSel}){
  const leads=useMemo(crmLeads,[]);
  const [q,setQ]=useState("");
  const byStage=s=>leads.filter(l=>l.stage===s);
  const open=leads.filter(l=>!["won","lost"].includes(l.stage)).length;
  const won=byStage("won").length;
  const rows=leads.filter(l=>!q||(l.title+" "+l.company).toLowerCase().includes(q.toLowerCase()));
  return html`<div><h2>CRM</h2>
    <div className="lead">Booked replies sync to Close with full context — leads, contacts, activities, stages.</div>
    <div className="chips"><${Chip} n=${open} l="Open in pipeline" cls="b"/><${Chip} n=${byStage("meeting").length} l="Meetings booked" cls="a"/><${Chip} n=${won} l="Won (VA seats)" cls="g"/><${Chip} n=${"$"+(won*7200).toLocaleString()} l="Est. booked value" cls="g"/></div>
    <div className="panel" style=${{padding:"14px 16px"}}><div className="row" style=${{justifyContent:"space-between"}}><div><span style=${{fontWeight:800}}>Close CRM</span> <span className="pill cand">${leads.length} leads</span></div></div>
      <div className="tbl-tools" style=${{marginTop:12,marginBottom:0}}>
        <input className="search" placeholder="Search leads…" value=${q} onInput=${e=>setQ(e.target.value)}/>
        <button className="btn primary sm">+ New Lead</button><button className="btn sm">⤒ Import CSV</button></div></div>
    ${STAGES.map(st=>{const items=rows.filter(l=>l.stage===st[0]); if(!items.length) return null; const stt=STATUS[st[0]]; return html`<div key=${st[0]}>
      <div className="sec-h"><span className="dot" style=${{background:st[2]}}></span>${st[1]} <span className="muted" style=${{fontWeight:600}}>(${items.length})</span></div>
      ${items.map(l=>html`<div key=${l.id} className="lead-row" onClick=${()=>setSel(l)}>
        <div style=${{flex:1,minWidth:0}}><div className="co">${l.company}</div><div className="u">${l.title}</div></div>
        <span className="muted" style=${{whiteSpace:"nowrap"}}>${contactsFor(l).length} contact${contactsFor(l).length>1?"s":""}</span>
        <span className=${"status "+stt[1]}>${stt[1]==="won"||stt[1]==="active"?html`<span className="d2"></span>`:""}${stt[0]}</span>
        <span className="muted">›</span></div>`)}</div>`;})}
    <div className="muted" style=${{marginTop:8}}>Demo pipeline (DRY-RUN) — real leads sync once SalesBlink replies + Close are connected.</div></div>`;}

function Toggle({on}){return html`<span style=${{display:"inline-flex",width:38,height:22,borderRadius:20,background:on?"var(--green)":"var(--line2)",position:"relative",transition:".15s"}}><span style=${{position:"absolute",top:2,left:on?18:2,width:18,height:18,borderRadius:"50%",background:"#fff",transition:".15s",boxShadow:"0 1px 2px rgba(0,0,0,.2)"}}></span></span>;`}
function Settings(){
  const [flash,setFlash]=useState("");
  const run=n=>{setFlash(n+" queued (DRY-RUN — no external calls)");setTimeout(()=>setFlash(""),2500);};
  return html`<div><h2>Settings</h2><div className="lead">Safety toggles, targeting, and manual pipeline triggers.</div>
    <div className="panel"><h3>Safety</h3>
      <div className="kv"><span className="k">DRY-RUN (nothing sends or spends)</span><${Toggle} on=${true}/></div>
      <div className="kv"><span className="k">Agent enabled (daily cron)</span><${Toggle} on=${true}/></div>
      <div className="kv"><span className="k">Require human approval before send</span><${Toggle} on=${true}/></div></div>
    <div className="panel"><h3>Targeting</h3>
      <div className="kv"><span className="k">Geography</span><span>United States (HQ)</span></div>
      <div className="kv"><span className="k">Sources</span><span>Indeed · LinkedIn (paused)</span></div>
      <div className="kv"><span className="k">Target titles</span><span>25 healthcare-admin roles</span></div>
      <div className="kv"><span className="k">Score gate</span><span>≥70 qualified · 40–69 nurture</span></div>
      <div className="kv"><span className="k">Freshness window</span><span>14 days</span></div></div>
    <div className="panel"><h3>Manual runs</h3>
      <div className="row">${["Scrape now","Re-score all","Run eval","Distill rules"].map(b=>html`<button key=${b} className="btn sm" onClick=${()=>run(b)}>${b}</button>`)}</div>
      ${flash&&html`<div className="muted" style=${{marginTop:10,color:"var(--green)"}}>✓ ${flash}</div>`}</div>
    <div className="panel"><h3>Data</h3>
      <div className="row"><button className="btn sm" onClick=${()=>{localStorage.removeItem(LS);location.reload();}}>Reset my feedback (local)</button></div>
      <div className="muted" style=${{marginTop:8}}>Feedback is stored in your browser in this demo. The live build persists to Supabase.</div></div></div>`;}

const TABS=[["pipeline","Pipeline","▦"],["jobs","Jobs","☰"],["crm","CRM","▤"],["review","Review","✎"],["outreach","Outreach","✉"],["learning","Learning","◈"],["tools","Tools","⚙"],["settings","Settings","⚙"],["benchmark","Why better","★"]];
function App(){
  const [tab,setTab]=useState("pipeline"); const [sel,setSel]=useState(null); const [fb,setFb]=useState(loadFb());
  const leads=D.leads;
  return html`<div>
    <div className="top"><div className="top-in"><div className="logo">Q</div><div className="brand"><h1>QuickTeam Outbound</h1><div className="sub">Signal-scored VA staffing pipeline</div></div><span className="dry">DRY-RUN</span></div>
      <div className="top-in dnav">${TABS.map(t=>html`<button key=${t[0]} className=${tab===t[0]?"on":""} onClick=${()=>setTab(t[0])}>${t[1]}</button>`)}</div></div>
    <div className="wrap">
      ${tab==="pipeline"&&html`<${Pipeline} leads=${leads} setSel=${setSel} go=${setTab}/>`}
      ${tab==="jobs"&&html`<${Jobs} leads=${leads} setSel=${setSel}/>`}
      ${tab==="crm"&&html`<${CRM} setSel=${setSel}/>`}
      ${tab==="review"&&html`<${Review} fb=${fb} setFb=${setFb}/>`}
      ${tab==="outreach"&&html`<${Outreach} leads=${leads}/>`}
      ${tab==="learning"&&html`<${Learning}/>`}
      ${tab==="tools"&&html`<${Tools}/>`}
      ${tab==="settings"&&html`<${Settings}/>`}
      ${tab==="benchmark"&&html`<${Benchmark}/>`}</div>
    <${Sheet} l=${sel} onClose=${()=>setSel(null)} fb=${fb} setFb=${setFb}/>
    <div className="tabbar">${TABS.map(t=>html`<button key=${t[0]} className=${tab===t[0]?"on":""} onClick=${()=>setTab(t[0])}><span className="ic">${t[2]}</span>${t[1]}</button>`)}</div></div>`;}
ReactDOM.createRoot(document.getElementById("root")).render(html`<${App}/>`);
</script>
</body>
</html>
